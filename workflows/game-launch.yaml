# ════════════════════════════════════════════════════════════
# 抖音小游戏上架 — 多 Agent 协同工作流
# ════════════════════════════════════════════════════════════
#
# 使用方式:
#   node orchestrator.js --workflow workflows/game-launch.yaml --cwd ./your-game
#
# Agent 角色:
#   planner  — 策划师：负责广告变现方案、玩法打磨、上架策略
#   reviewer — 验证官：负责可行性验证、合规审查、收益预估
#   coder    — 程序员：负责代码实现

name: 抖音小游戏上架全流程

agents:
  planner:
    role: 📋 策划师
    system: |
      你是一位资深的抖音小游戏策划师，拥有丰富的小游戏变现经验。
      你非常熟悉抖音小游戏平台的广告 SDK（穿山甲/巨量引擎）、
      激励视频、插屏广告、Banner 广告的接入规范和最佳实践。
      你必须用中文输出所有方案。
      你的方案必须包含具体的数据指标和实施细节。

  reviewer:
    role: 🔍 验证官
    system: |
      你是一位严苛的商业可行性分析师和技术审计专家。
      你的工作是审查策划方案的可行性，包括：
      - 技术实现难度评估
      - 抖音平台合规性审查
      - 收益模型验证
      - 用户体验影响分析
      你必须用中文输出所有分析报告。
      评分请使用 1-10 分制。

  coder:
    role: 💻 程序员
    system: |
      你是一位精通 HTML5 Canvas + JavaScript 的小游戏开发工程师。
      你熟悉抖音小游戏的开发框架和广告 SDK 接入方式。
      收到确认后的技术方案后，你需要直接在项目代码中实现。
      你必须用中文解释你的代码修改。

stages:
  # ── 阶段 1：策划 ──────────────────────────────────────────
  - name: 策划阶段 — 广告变现与玩法打磨
    parallel:
      - agent: planner
        task: |
          请为当前项目设计一套完整的抖音小游戏上架方案。

          请详细输出以下内容（全部使用中文）：

          ## 一、广告变现方案
          1. 激励视频广告：在什么场景触发？奖励是什么？频率限制？
          2. 插屏广告：在什么时机展示？如何避免影响体验？
          3. Banner 广告：放在哪个位置？尺寸？

          ## 二、玩法打磨建议
          1. 新手引导流程设计
          2. 每日任务系统
          3. 排行榜与社交分享
          4. 留存钩子（每日登录奖励等）

          ## 三、变现预估模型
          1. 预期 DAU
          2. 广告展示频率
          3. eCPM 估算
          4. 月收入预估

          ## 四、上架检查清单
          1. 需要准备的素材
          2. 审核注意事项
          3. 发布时间线

    checkpoint:
      name: 📋 策划方案审阅
      message: |
        以上是策划师生成的完整方案。
        请仔细审阅后输入您的修改意见（例如："广告频率太高了，激励视频改为每5分钟一次"）。
        或输入"通过"继续进入可行性验证阶段。

  # ── 阶段 2：验证 ──────────────────────────────────────────
  - name: 可行性验证 — 风险与收益分析
    sequential:
      - agent: reviewer
        task: |
          请审查以下策划方案的可行性。

          【策划师的方案】
          {{agent:planner}}

          请从以下四个维度进行详细分析（全部使用中文）：

          ## 一、技术可行性 (评分 1-10)
          - 广告 SDK 接入难度
          - 现有代码架构是否支持
          - 预计开发工时

          ## 二、平台合规性 (评分 1-10)
          - 是否符合抖音小游戏审核规范
          - 广告展示频率是否合规
          - 是否存在被拒审风险

          ## 三、收益预估验证 (评分 1-10)
          - 策划师的 DAU 预估是否合理
          - eCPM 预估是否符合行业水平
          - 月收入预估是否可信

          ## 四、用户体验影响 (评分 1-10)
          - 广告是否过于干扰游戏体验
          - 激励视频的奖励设计是否合理
          - 留存策略是否有效

          ## 五、综合评分与建议
          - 综合得分
          - 最大风险点
          - 改进建议

    checkpoint:
      name: 🔍 验证报告审阅
      message: |
        以上是验证官对策划方案的可行性分析报告。
        请审阅后决定是否进入开发阶段。
        输入"通过"开始编码，或输入修改意见返回策划阶段。

  # ── 阶段 3：执行 ──────────────────────────────────────────
  - name: 开发执行 — 代码实现
    sequential:
      - agent: coder
        task: |
          根据已通过审核的策划方案，请在项目代码中实现以下功能。

          【已通过的策划方案】
          {{agent:planner}}

          【验证官的技术建议】
          {{agent:reviewer}}

          请实现：
          1. 广告触发点的占位代码（预留 SDK 接入口）
          2. 激励视频的触发逻辑和奖励发放
          3. 每日任务系统的基础框架
          4. 所有代码修改请用中文注释说明

    checkpoint:
      name: 💻 代码审查
      message: |
        程序员已完成编码实现。
        请审查代码变更，确认无误后输入"通过"完成工作流。
